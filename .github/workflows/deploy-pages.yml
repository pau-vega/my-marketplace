name: Deploy Marketplace to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - marketplace.html
      - scripts/build-marketplace.sh
      - .claude-plugin/marketplace.json
      - '**/skills/**/SKILL.md'
      - '**/agents/*.md'
      - '**/commands/*.md'
      - '**/hooks/hooks.json'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build marketplace data
        run: bash scripts/build-marketplace.sh

      - name: Prepare site
        run: |
          mkdir _site
          cp marketplace.html _site/index.html

      - uses: actions/upload-pages-artifact@v4

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
